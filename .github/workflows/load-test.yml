name: Parkly Webhook & SignalR Load Test

on:
  workflow_dispatch:

jobs:
  run-load-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore Dependencies
        run: dotnet restore

      # السيرفر سيتوجه مباشرة إلى مجلد المشروع ويشغل ملف الـ csproj الموجود فيه
      - name: Execute NBomber Load Test
        run: dotnet run --project Parkly.LoadTests/Parkly.LoadTests.csproj -c Release