name: Parkly Webhook & SignalR Load Test

on:
  workflow_dispatch:

jobs:
  run-load-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore Dependencies
        run: dotnet restore

      # التعديل السحري: البحث التلقائي عن ملف المشروع وتشغيله أينما كان
      - name: Execute NBomber Load Test
        run: dotnet run --project **/*.csproj -c Release